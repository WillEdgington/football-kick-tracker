[tool.commitizen]
name = "cz_conventional_commits"
version = "0.1.0"
tag_format = "v$version"
allowed_prefixes = ["experiment"]

[tool.black]
line-length = 88

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I"]  # E: style, F: errors, I: imports

[tool.pytest.ini_options]
testpaths = ["tests"]
